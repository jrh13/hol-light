# HOL Light MCP server configuration.
# This file is loaded by default from /path/to/hol-light/mcp/hol-mcp.toml.
# To use a different config, pass --config /absolute/path/to/hol-mcp.toml.

# Which checkpoint to use (looks for hol-<name>.ckpt/ in HOL Light root).
# Create with: python3 mcp/make_checkpoint.py --name <name> [options]
checkpoint = "noledit"

# Timeout in seconds for HOL Light commands.
timeout = 600

# Maximum characters for eval output before truncation.
max_output_chars = 4000

# Auto-record proof tactics to this directory (recording.jsonl).
# Relative paths resolved against CWD. Also settable via HOL_RECORDING_DIR env var.
# recording_dir = "/path/to/work"
